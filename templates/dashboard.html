{% extends "base.html" %}

{% block content %}

<div class="dashboard">

    <div class="dashboard-header">

        <h1>Dashboard</h1>

        <a class="btn" href="/start-interview">
            + Create Interview
        </a>

    </div>

    <div class="interview-grid">

        {% for interview in interviews %}

        <div class="interview-card">

            <div class="interview-title">
                Interview #{{ interview.id }}
            </div>

            <div class="resume-status">

                <strong>Resume:</strong>

                {% if interview.resume %}
                    Uploaded ✅
                {% else %}
                    Not Uploaded ❌
                {% endif %}

            </div>

            <form
                class="upload-section"
                action="/upload-resume/{{ interview.id }}"
                method="POST"
                enctype="multipart/form-data">

                <input
                    class="file-input"
                    type="file"
                    name="resume"
                    accept=".pdf"
                    required>

                <br><br>

                <button
                    type="submit"
                    class="btn">

                    Upload Resume

                </button>

            </form>

            <div class="button-group">

                <a
                    class="btn"
                    href="/interview/{{ interview.id }}">

                    Start Interview

                </a>

                <a
                    class="btn"
                    href="/resume-analysis/{{ interview.id }}">

                    Analyze Resume

                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
